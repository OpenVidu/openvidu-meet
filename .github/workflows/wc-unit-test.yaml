name: WebComponent Unit Tests
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-test:
    name: WebComponent Unit Tests
    runs-on: ${{ vars.LABEL_WORKER_SELFHOSTED }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.13.1'
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.18.3
      - name: Install safe-chain
        uses: OpenVidu/actions/install-safe-chain@1eb0c5759951f915de29647dedfa1ec8fbb5eeac # v1.0.20
      - name: Checkout OpenVidu Meet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: ./meet.sh install

      - name: Build typings
        run: ./meet.sh build-typings --skip-install

      - name: Build webcomponent
        run: ./meet.sh build-webcomponent --skip-install --skip-typings

      - name: Run tests
        run: ./meet.sh test-unit-webcomponent --skip-install

      - name: Clean up
        if: always()
        uses: OpenVidu/actions/cleanup@1eb0c5759951f915de29647dedfa1ec8fbb5eeac # v1.0.20
