name: WebComponent Unit Tests
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-test:
    name: WebComponent Unit Tests
    runs-on: ${{ vars.LABEL_WORKER_SELFHOSTED }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.13'
      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 10.18.3
      - name: Install safe-chain
        uses: OpenVidu/actions/install-safe-chain@0125dee363f943e399bf576e8e4c162fafcc5bdd # v1.0.16
      - name: Checkout OpenVidu Meet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: ./meet.sh install

      - name: Build typings
        run: ./meet.sh build-typings --skip-install

      - name: Build webcomponent
        run: ./meet.sh build-webcomponent --skip-install --skip-typings

      - name: Run tests
        run: ./meet.sh test-unit-webcomponent --skip-install

      - name: Clean up
        if: always()
        uses: OpenVidu/actions/cleanup@0125dee363f943e399bf576e8e4c162fafcc5bdd # v1.0.16
