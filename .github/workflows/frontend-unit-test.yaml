name: Frontend Unit Tests

on:
  push:
    tags-ignore: ['**']
    paths:
      - 'meet-ce/frontend/**'
      - 'meet.sh'
      - '.github/workflows/frontend-unit-test.yaml'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit-test:
    name: Frontend Unit Tests
    runs-on: ${{ vars.LABEL_WORKER_SELFHOSTED }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: /tmp/ms-playwright
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.15.0'
      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11.8.0
      - name: Install safe-chain
        uses: OpenVidu/actions/install-safe-chain@040cbfd01320475801d7b12e33769e0d55a737a8 # v1.0.21
      - name: Checkout OpenVidu Meet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: ./meet.sh install

      - name: Run frontend library unit tests
        run: ./meet.sh test-unit-frontend --skip-install

      - name: Clean up
        if: always()
        uses: OpenVidu/actions/cleanup@040cbfd01320475801d7b12e33769e0d55a737a8 # v1.0.21
