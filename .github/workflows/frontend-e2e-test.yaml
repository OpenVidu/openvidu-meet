name: Frontend E2E Tests

on:
  push:
    paths:
      - 'meet-ce/frontend/**'
      - 'meet-ce/backend/**'
      - 'meet.sh'
      - '.github/workflows/frontend-e2e-test.yaml'
  pull_request:
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Frontend E2E Tests
    runs-on: ${{ vars.LABEL_WORKER_SELFHOSTED }}
    steps:
      - name: Checkout OpenVidu Meet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24.13.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.28.0

      - name: Install safe-chain
        uses: OpenVidu/actions/install-safe-chain@a5d6165c017b522939a9bf180e2f73c76c44f000 # v1.0.17

      - name: Install LK CLI
        run: curl -sSL https://get.livekit.io/cli | bash

      - name: Setup OpenVidu Local Deployment
        uses: OpenVidu/actions/start-openvidu-local-deployment@0f5592e91f0dca4c62e7a3cf412a6c17cf432b6d # v1.0.4
        with:
          ref-openvidu-local-deployment: development
          pre_startup_commands: |
            cat <<'BASH' > pre_startup_commands.sh
            #!/bin/bash
            echo "Commenting out openvidu-meet container in docker-compose.yaml"
            if [ -f docker-compose.yaml ]; then
              yq e 'del(.services.openvidu-meet)' -i docker-compose.yaml
            fi
            BASH
            chmod +x pre_startup_commands.sh && ./pre_startup_commands.sh

      - name: Build and Start OpenVidu Meet
        uses: OpenVidu/actions/start-openvidu-meet@71140a5995c61cf05c994955f49da71844f2ea3c # v1.0.4
        env:
          MEET_INITIAL_WEBHOOK_ENABLED: true
          MEET_INITIAL_WEBHOOK_URL: 'http://localhost:5080/webhook'

      - name: Run frontend E2E tests
        run: ./meet.sh test-e2e-frontend --skip-install
        env:
          RUN_MODE: CI
          PLAYWRIGHT_BROWSERS_PATH: /tmp/ms-playwright

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-e2e-test-results
          path: meet-ce/frontend/test-results/
          retention-days: 2
      - name: Generate test report
        if: always()
        run: |
          echo "# Frontend E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Try to find the results file (handle both results.json and .last-run.json)
          RESULTS_FILE=""
          if [ -f "meet-ce/frontend/test-results/results.json" ]; then
            RESULTS_FILE="meet-ce/frontend/test-results/results.json"
          elif [ -f "meet-ce/frontend/test-results/.last-run.json" ]; then
            RESULTS_FILE="meet-ce/frontend/test-results/.last-run.json"
          fi

          if [ -n "$RESULTS_FILE" ]; then
            TOTAL=$(jq '.stats.expected' "$RESULTS_FILE")
            PASSED=$(jq '.stats.expected - .stats.unexpected - .stats.skipped' "$RESULTS_FILE")
            FAILED=$(jq '.stats.unexpected' "$RESULTS_FILE")
            SKIPPED=$(jq '.stats.skipped' "$RESULTS_FILE")

            echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 📊 Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$FAILED" -gt 0 ]; then
              echo "## Failed Tests Details" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| File | Test Name | Duration (ms) | Error |" >> $GITHUB_STEP_SUMMARY
              echo "|------|-----------|---------------|-------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.suites[] | .file as $file | .specs[] | select(.ok == false) | {file: $file, title: .title, duration: (.duration // 0), error: (.failures[0].error.message // "Unknown error" | gsub("\n"; " ") | gsub("|"; "\\|"))} | "| \(.file | split("/")[-1]) | \(.title | .[0:50]) | \(.duration) | \(.error | .[0:70]) |"' "$RESULTS_FILE" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>📋 Full Error Messages</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              jq -r '.suites[] | .file as $file | .specs[] | select(.ok == false) | "### ❌ \(.title)\n**File:** `\($file)`\n**Error:**\n\`\`\`\n\(.failures[0].error.message // "Unknown error")\n\`\`\`\n"' "$RESULTS_FILE" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            else
              echo "## ✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No test results file found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Looking for `.last-run.json` or `results.json` in test-results directory..." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Available files:" >> $GITHUB_STEP_SUMMARY
            find meet-ce/frontend/test-results -maxdepth 1 -type f 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No test-results directory found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        uses: OpenVidu/actions/cleanup@0f5592e91f0dca4c62e7a3cf412a6c17cf432b6d # v1.0.4