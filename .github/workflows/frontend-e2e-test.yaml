name: Frontend E2E Tests

on:
  push:
    tags-ignore: ['**']
    paths:
      - 'meet-ce/frontend/**'
      - 'meet-ce/backend/**'
      - 'meet.sh'
      - '.github/workflows/frontend-e2e-test.yaml'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  e2e-tests:
    name: Frontend E2E Tests
    runs-on: ${{ vars.LABEL_WORKER_SELFHOSTED }}
    steps:
      - name: Checkout OpenVidu Meet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.15.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11.8.0

      - name: Install safe-chain
        uses: OpenVidu/actions/install-safe-chain@040cbfd01320475801d7b12e33769e0d55a737a8 # v1.0.21

      - name: Setup OpenVidu Local Deployment
        uses: OpenVidu/actions/start-openvidu-local-deployment@040cbfd01320475801d7b12e33769e0d55a737a8 # v1.0.21
        with:
          ref-openvidu-local-deployment: development
          pre_startup_commands: |
            cat <<'BASH' > pre_startup_commands.sh
            #!/bin/bash
            echo "Commenting out openvidu-meet container in docker-compose.yaml"
            if [ -f docker-compose.yaml ]; then
              yq e 'del(.services.openvidu-meet)' -i docker-compose.yaml
            fi
            BASH
            chmod +x pre_startup_commands.sh && ./pre_startup_commands.sh

      - name: Build and Start OpenVidu Meet
        uses: OpenVidu/actions/start-openvidu-meet@040cbfd01320475801d7b12e33769e0d55a737a8 # v1.0.21

      - name: Run frontend E2E tests
        run: ./meet.sh test-e2e-frontend --skip-install
        env:
          RUN_MODE: CI
          PLAYWRIGHT_BROWSERS_PATH: /tmp/ms-playwright

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-e2e-test-results
          path: meet-ce/frontend/test-results/
          retention-days: 2
      - name: Generate test report
        if: always()
        run: |
          echo "# Frontend E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "meet-ce/frontend/test-results/results.json" ]; then
            TOTAL=$(jq '.stats.expected' meet-ce/frontend/test-results/results.json)
            PASSED=$(jq '.stats.expected - .stats.unexpected - .stats.skipped' meet-ce/frontend/test-results/results.json)
            FAILED=$(jq '.stats.unexpected' meet-ce/frontend/test-results/results.json)
            SKIPPED=$(jq '.stats.skipped' meet-ce/frontend/test-results/results.json)

            echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 📊 Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$FAILED" -gt 0 ]; then
              echo "## Failed Tests Details" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| File | Test Name | Duration (ms) | Error |" >> $GITHUB_STEP_SUMMARY
              echo "|------|-----------|---------------|-------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.suites[] | .file as $file | .specs[] | select(.ok == false) | {file: $file, title: .title, duration: (.duration // 0), error: (.failures[0].error.message // "Unknown error" | gsub("\n"; " ") | gsub("|"; "\\|"))} | "| \(.file | split("/")[-1]) | \(.title | .[0:50]) | \(.duration) | \(.error | .[0:70]) |"' meet-ce/frontend/test-results/results.json >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>📋 Full Error Messages</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              jq -r '.suites[] | .file as $file | .specs[] | select(.ok == false) | "### ❌ \(.title)\n**File:** `\($file)`\n**Error:**\n```\n\(.failures[0].error.message // "Unknown error")\n```\n"' meet-ce/frontend/test-results/results.json >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            else
              echo "## ✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Test results file not found at meet-ce/frontend/test-results/results.json" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Available files:" >> $GITHUB_STEP_SUMMARY
            find meet-ce/frontend/test-results -type f 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || echo "No test-results directory found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        uses: OpenVidu/actions/cleanup@040cbfd01320475801d7b12e33769e0d55a737a8 # v1.0.21