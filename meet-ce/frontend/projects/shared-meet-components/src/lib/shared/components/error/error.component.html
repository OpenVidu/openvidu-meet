<div class="error-page">
	<div class="error-container fade-in">
		<div class="error-content">
			<div class="error-icon-section">
				<mat-icon class="error-main-icon">error_outline</mat-icon>
			</div>

			<div class="error-details">
				<h1 class="error-title">{{ errorTitleKey() | translate }}</h1>
				@if (errorMessageKey()) {
					<p class="error-message">{{ errorMessageKey() | translate }}</p>
				}
			</div>

			<div class="error-actions">
				@if (showBackButton()) {
					<div class="fade-in-delayed-more">
						<button mat-button (click)="goBack()">
							<mat-icon>arrow_back</mat-icon>
							<span>{{ backButtonTextKey() | translate }}</span>
						</button>
					</div>
				}
			</div>
		</div>

		<div class="error-illustration">
			<div class="illustration-container">
				<mat-icon class="illustration-icon">cloud_off</mat-icon>
				<div class="illustration-text">
					<span class="illustration-title">{{ 'ERROR.OOPS' | translate }}</span>
					<span class="illustration-subtitle">{{ 'ERROR.SOMETHING_WRONG' | translate }}</span>
				</div>
			</div>
		</div>
	</div>
</div>
