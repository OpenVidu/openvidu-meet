<form>
	<!-- Brand Logo -->
	<div class="form-section">
		<div class="form-field-header">
			<h3>{{ 'LOGO_SELECTOR.TITLE' | translate }}</h3>
			<ov-pro-feature-badge />
		</div>
		<p class="field-description">{{ 'LOGO_SELECTOR.DESCRIPTION' | translate }}</p>

		<div class="logo-upload-section">
			<div class="logo-preview">
				<div class="logo-placeholder">
					<img [src]="logoUrl" alt="OpenVidu Meet" class="logo-image" />
				</div>
			</div>

			<div class="pro-upgrade-message">
				<p>{{ 'LOGO_SELECTOR.UPGRADE_MESSAGE' | translate }}</p>
				<button mat-raised-button color="primary">
					<mat-icon>upgrade</mat-icon>
					{{ 'LOGO_SELECTOR.UPGRADE_BUTTON' | translate }}
				</button>
			</div>
		</div>
	</div>
</form>
