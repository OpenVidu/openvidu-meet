<nav class="wizard-navigation" [class.loading]="false" [class.compact]="false" id="wizard-navigation">
	<div class="nav-buttons">
		<!-- Cancel Button -->
		@if (config().showCancel) {
			<button
				mat-stroked-button
				class="cancel-btn"
				id="wizard-cancel-btn"
				(click)="onCancel()"
				[attr.aria-label]="'ROOMS.WIZARD.CANCEL_ARIA' | translate"
			>
				<mat-icon class="leading-icon">close</mat-icon>
				{{ config().cancelLabel || ('ROOMS.WIZARD.CANCEL' | translate) }}
			</button>
		}

		@if (config().showBack) {
			<!-- Back Button -->
			<button
				mat-stroked-button
				class="back-btn"
				id="wizard-back-btn"
				(click)="onBack()"
				[attr.aria-label]="'ROOMS.WIZARD.GO_BACK_ARIA' | translate"
			>
				<mat-icon class="leading-icon">arrow_back</mat-icon>
				{{ backButtonText() }}
			</button>
		}

		<div class="spacer"></div>

		<!-- Navigation Group -->
		<div class="nav-group">
			<!-- Previous Button -->
			@if (config().showPrevious) {
				<button
					mat-stroked-button
					class="prev-btn"
					id="wizard-previous-btn"
					(click)="onPrevious()"
					[attr.aria-label]="'ROOMS.WIZARD.PREVIOUS_ARIA' | translate"
				>
					<mat-icon class="leading-icon">chevron_left</mat-icon>
					{{ config().previousLabel || ('ROOMS.WIZARD.PREVIOUS' | translate) }}
				</button>
			}

			@if (config().showSkipAndFinish) {
				<!-- Skip Wizard Button -->
				<button
					mat-raised-button
					class="finish-btn"
					id="wizard-quick-create-btn"
					[disabled]="config().disableFinish ?? false"
					(click)="skipAndFinish()"
					[attr.aria-label]="'ROOMS.WIZARD.SKIP_ARIA' | translate"
				>
					<mat-icon>bolt</mat-icon>
					{{ config().skipAndFinishLabel || ('ROOMS.WIZARD.SKIP_AND_FINISH' | translate) }}
				</button>
			}

			<!-- Next Button -->
			@if (config().showNext) {
				<button
					mat-raised-button
					class="next-btn"
					id="wizard-next-btn"
					(click)="onNext()"
					[attr.aria-label]="'ROOMS.WIZARD.NEXT_ARIA' | translate"
				>
					{{ config().nextLabel || ('ROOMS.WIZARD.NEXT' | translate) }}
					<mat-icon class="trailing-icon">chevron_right</mat-icon>
				</button>
			}

			<!-- Finish Button -->
			@if (config().showFinish) {
				<button
					mat-raised-button
					class="finish-btn"
					id="wizard-finish-btn"
					[disabled]="config().disableFinish ?? false"
					(click)="onFinish()"
					[attr.aria-label]="'ROOMS.WIZARD.FINISH_ARIA' | translate"
				>
					<mat-icon class="leading-icon">check</mat-icon>
					{{ config().finishLabel || ('ROOMS.WIZARD.FINISH' | translate) }}
				</button>
			}
		</div>
	</div>
</nav>
