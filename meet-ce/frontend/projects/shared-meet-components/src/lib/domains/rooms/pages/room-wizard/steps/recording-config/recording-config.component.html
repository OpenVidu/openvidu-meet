<div class="recording-config-step fade-in">
	<!-- Header Section -->
	<header class="step-header">
		<mat-icon class="ov-recording-icon step-icon">video_library</mat-icon>
		<div class="step-title-group">
			<h3 class="step-title">Recording Configuration</h3>
			<p class="step-description">Choose whether to enable recording capabilities for this room</p>
		</div>
	</header>

	<!-- Form Section -->
	<main class="step-content">
		<form [formGroup]="recordingForm" class="recording-form">
			<!-- Options Cards -->
			<div class="options-grid">
				@for (option of recordingOptions; track option.id) {
					<ov-selectable-card
						[option]="option"
						[selectedValue]="selectedValue"
						[allowMultiSelect]="false"
						[showSelectionIndicator]="true"
						[showRecommendedBadge]="option.recommended ?? false"
						(optionSelected)="onOptionSelect($event)"
					></ov-selectable-card>
				}
			</div>

			<!-- Anonymous Recording Access -->
			@if (isRecordingEnabled) {
				<div class="anonymous-access-row">
					<div class="permission-info">
						<mat-icon class="permission-icon anonymous-icon">no_accounts</mat-icon>
						<div class="permission-text">
							<span class="permission-label">Anonymous Recording Access</span>
							<span class="permission-description"
								>Allow users to access recordings without logging in</span
							>
						</div>
					</div>
					<mat-slide-toggle
						formControlName="anonymousRecordingEnabled"
						color="primary"
						class="permission-toggle"
					></mat-slide-toggle>
				</div>
			}
		</form>
	</main>
</div>
