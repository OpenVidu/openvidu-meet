<div class="dialog-container">
	<h2 mat-dialog-title class="dialog-title">
		<mat-icon class="dialog-icon">key</mat-icon>
		{{ 'USERS.RESET_PASSWORD_DIALOG.TITLE' | translate }}
	</h2>

	<mat-dialog-content>
		<p class="dialog-subtitle">
			{{ 'USERS.RESET_PASSWORD_DIALOG.SUBTITLE' | translate }}
			<strong>{{ data.user.name }}</strong>
			<span class="user-id-hint">({{ data.user.userId }})</span>
		</p>

		<div class="password-section">
			<div class="label-row">
				<span class="input-label">{{ 'USERS.COMMON.TEMPORARY_PASSWORD' | translate }}</span>
				<button mat-button class="generate-btn" type="button" (click)="generatePassword()">
					<mat-icon>autorenew</mat-icon>
					{{ 'USERS.COMMON.AUTO_GENERATE' | translate }}
				</button>
			</div>

			<mat-form-field subscriptSizing="dynamic" appearance="outline" class="password-field">
				<input
					matInput
					[ngModel]="password()"
					(ngModelChange)="password.set($event)"
					[type]="showPassword() ? 'text' : 'password'"
					[placeholder]="'USERS.RESET_PASSWORD_DIALOG.PASSWORD_PLACEHOLDER' | translate"
				/>
				<div matSuffix class="suffix-btns">
					<button
						mat-icon-button
						type="button"
						(click)="copyToClipboard()"
						[matTooltip]="copied() ? ('USERS.COMMON.COPIED' | translate) : ('USERS.COMMON.COPY_TO_CLIPBOARD' | translate)"
					>
						<mat-icon>{{ copied() ? 'check' : 'content_copy' }}</mat-icon>
					</button>
					<button
						mat-icon-button
						type="button"
						(click)="showPassword.set(!showPassword())"
						[matTooltip]="showPassword() ? ('USERS.COMMON.HIDE_PASSWORD' | translate) : ('USERS.COMMON.SHOW_PASSWORD' | translate)"
					>
						<mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
					</button>
				</div>
			</mat-form-field>
		</div>

		<div class="info-banner">
			<mat-icon class="info-icon">info</mat-icon>
			<p>{{ 'USERS.RESET_PASSWORD_DIALOG.INFO_BANNER' | translate }}</p>
		</div>
	</mat-dialog-content>

	<mat-dialog-actions class="dialog-actions">
		<button mat-button class="cancel-button" (click)="cancel()">{{ 'USERS.COMMON.CANCEL' | translate }}</button>
		<button mat-button class="primary-button" [disabled]="!password() || isSaving()" (click)="confirm()">
			@if (isSaving()) {
				<mat-spinner diameter="18" />
			} @else {
				{{ 'USERS.RESET_PASSWORD_DIALOG.TITLE' | translate }}
			}
		</button>
	</mat-dialog-actions>
</div>
