<div class="ov-page-container">
	<div class="login-page-content">
		<!-- Login Header -->
		<div class="get-started-header">
			<mat-icon class="ov-about-icon login-icon" aria-hidden="true">login</mat-icon>
			<h1>{{ 'AUTH.LOGIN.TITLE' | translate }}</h1>
			<p class="subtitle">{{ 'AUTH.LOGIN.SUBTITLE' | translate }}</p>
		</div>

		<!-- Login Card -->
		<div class="login-form-container">
			<mat-card class="login-card">
				<mat-card-content>
					<form [formGroup]="loginForm" (ngSubmit)="login()" id="login-form">
						<mat-form-field class="form-input" appearance="outline">
							<mat-label>{{ 'AUTH.LOGIN.USER_ID' | translate }}</mat-label>
							<input
								matInput
								formControlName="userId"
								[placeholder]="'AUTH.LOGIN.USER_ID_PLACEHOLDER' | translate"
								id="userId-input"
							/>
							<mat-icon matPrefix>person</mat-icon>
						</mat-form-field>

						<mat-form-field class="form-input" appearance="outline">
							<mat-label>{{ 'AUTH.LOGIN.PASSWORD' | translate }}</mat-label>
							<input
								matInput
								[type]="showPassword() ? 'text' : 'password'"
								formControlName="password"
								[placeholder]="'AUTH.LOGIN.PASSWORD_PLACEHOLDER' | translate"
								id="password-input"
							/>
							<mat-icon matPrefix>lock</mat-icon>
							<button
								mat-icon-button
								matSuffix
								type="button"
								(click)="showPassword.set(!showPassword())"
								[matTooltip]="(showPassword() ? 'AUTH.COMMON.HIDE_PASSWORD' : 'AUTH.COMMON.SHOW_PASSWORD') | translate"
							>
								<mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
							</button>
						</mat-form-field>

						@if (loginErrorMessage()) {
							<mat-error class="login-error">{{ loginErrorMessage() }}</mat-error>
						}

						<div class="login-actions">
							<button
								mat-raised-button
								color="primary"
								type="submit"
								[disabled]="loginForm.invalid"
								id="login-button"
								class="primary-button"
							>
								{{ 'AUTH.LOGIN.SUBMIT' | translate }}
							</button>
						</div>
					</form>
				</mat-card-content>
			</mat-card>

			<!-- Brand Section -->
			<div class="brand-section">
				<div class="brand-content">
					<img [src]="logoUrl" alt="OpenVidu Meet" />
				</div>
			</div>
		</div>
	</div>
</div>
