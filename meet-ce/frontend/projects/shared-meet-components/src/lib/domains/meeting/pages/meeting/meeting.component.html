@if (showLobby()) {
	<!-- Lobby phase (before joining meeting) -->
	@if (lobbyState() === 'ready') {
		<ov-meeting-lobby />
	} @else if (lobbyState() === 'error') {
		<div class="prejoin-loading-container">
			<mat-icon>error</mat-icon>
			<p class="prejoin-loading-text">{{ 'MEETING_PAGE.PREPARE_ERROR' | translate }}</p>
		</div>
	} @else {
		<div class="prejoin-loading-container">
			<mat-spinner diameter="30" />
			<p class="prejoin-loading-text">{{ 'MEETING_PAGE.PREPARING' | translate }}</p>
		</div>
	}
} @else if (!isMeetingLeft()) {
	<ov-videoconference
		[token]="roomMemberToken()!"
		[prejoin]="true"
		[videoEnabled]="features().videoEnabled"
		[audioEnabled]="features().audioEnabled"
		[e2eeKey]="e2eeKey()"
		[toolbarRoomName]="roomName()"
		[toolbarCameraButton]="features().showCamera"
		[toolbarMicrophoneButton]="features().showMicrophone"
		[toolbarScreenshareButton]="features().showScreenShare"
		[toolbarLeaveButton]="!features().showEndMeeting"
		[toolbarRecordingButton]="features().showStartStopRecording"
		[toolbarViewRecordingsButton]="features().showViewRecordings && hasRecordings()"
		[toolbarChatPanelButton]="features().showChat"
		[chatWritable]="features().showChatInput"
		[toolbarBackgroundEffectsButton]="features().showBackgrounds"
		[toolbarParticipantsPanelButton]="features().showParticipantList"
		[toolbarSettingsButton]="features().showSettings"
		[toolbarFullscreenButton]="features().showFullscreen"
		[toolbarActivitiesPanelButton]="
			features().showStartStopRecording || (features().showViewRecordings && hasRecordings())
		"
		[activitiesPanelRecordingActivity]="
			features().showStartStopRecording || (features().showViewRecordings && hasRecordings())
		"
		[recordingActivityStartStopRecordingButton]="features().showStartStopRecording"
		[recordingActivityViewRecordingsButton]="features().showViewRecordings && hasRecordings()"
		[showThemeSelector]="features().showThemeSelector"
		[showDisconnectionDialog]="false"
		(onRoomCreated)="onRoomCreated($event)"
		(onParticipantConnected)="onParticipantConnected($event)"
		(onParticipantLeft)="onParticipantLeft($event)"
		(onRecordingStartRequested)="eventHandlerService.onRecordingStartRequested($event)"
		(onRecordingStopRequested)="eventHandlerService.onRecordingStopRequested($event)"
		(onViewRecordingsClicked)="onViewRecordingsClicked()"
	>
		<!-- Toolbar Leave Button (for moderators) -->
		<ng-container *ovToolbarLeaveButton>
			<ng-content select="ov-meeting-toolbar-leave-button" />
		</ng-container>

		<!-- Toolbar Additional Buttons -->
		<div *ovToolbarAdditionalButtons>
			<ng-content select="ov-meeting-toolbar-extra-buttons" />
		</div>

		<!-- Toolbar More Options Additional Items -->
		<ng-container *ovToolbarMoreOptionsAdditionalMenuItems>
			<ng-content select="ov-meeting-toolbar-more-options-menu" />
		</ng-container>

		<!-- Panel After Local Participant (only while alone) -->
		<div *ovParticipantPanelAfterLocalParticipant>
			@if (isAlone()) {
				@if (isEmbeddedMode()) {
					<!-- Embedded (webcomponent or iframe): link sharing is handled by the host app -->
					<div id="waiting-panel">
						<ng-content select="ov-meeting-waiting-panel" />
					</div>
				} @else {
					<!-- Standalone SPA mode: show the share/copy room access link panel -->
					<ng-content select="ov-meeting-invite-panel" />
				}
			}
		</div>

		<!-- Participant Panel Item Template -->
		<div *ovParticipantPanelItem="let participant">
			<ng-container
				[ngTemplateOutlet]="participantItemTemplate()"
				[ngTemplateOutletContext]="{ participant: participant }"
			/>
		</div>

		<ng-container *ovSettingsPanelGeneralAdditionalElements>
			<ng-content select="ov-meeting-settings-extensions" />
		</ng-container>

		<!-- Custom layout component -->
		<ng-container *ovLayout>
			<ng-content select="ov-meeting-custom-layout" />
		</ng-container>
	</ov-videoconference>
}
