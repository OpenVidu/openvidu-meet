<div class="disconnected-container">
	<div class="disconnect-content" role="main" aria-labelledby="disconnect-title">
		<div class="disconnect-icon-container">
			<img [src]="logoUrl" alt="OpenVidu Meet" class="logo-image" />
		</div>

		<div class="disconnect-message">
			<h1 id="disconnect-title" class="disconnect-title">{{ disconnectedTitleKey() | translate }}</h1>
			<p class="disconnect-subtitle">
				{{ disconnectReasonKey() | translate }}
			</p>
		</div>

		<div class="disconnect-footer">
			<p class="footer-text">{{ 'END_MEETING.FOOTER' | translate }}</p>
			@if (showBackButton()) {
				<div class="quick-actions fade-in-delayed-more">
					<button id="back-btn" mat-button class="quick-action-button" (click)="goBack()">
						<mat-icon>arrow_back</mat-icon>
						<span>{{ backButtonTextKey() | translate }}</span>
					</button>
				</div>
			}
		</div>
	</div>
</div>
