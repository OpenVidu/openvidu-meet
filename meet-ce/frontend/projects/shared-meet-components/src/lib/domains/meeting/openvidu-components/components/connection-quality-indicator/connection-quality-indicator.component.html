@if (showBadge()) {
	<div
		id="connection-quality-badge"
		class="connection-quality-badge"
		[class.quality-excellent]="connectionQuality() === 'excellent'"
		[class.quality-good]="connectionQuality() === 'good'"
		[class.quality-poor]="connectionQuality() === 'poor'"
		[class.quality-lost]="connectionQuality() === 'lost'"
	>
		<mat-icon [fontIcon]="icon()" />
	</div>
}
