<!-- Captions button -->
@if (showCaptionsButton()) {
	@if (isMobile()) {
		<!-- On mobile, the captions button will be inside a menu -->
		<button
			id="captions-button"
			mat-menu-item
			(click)="onCaptionsClick()"
			[disabled]="isCaptionsButtonDisabled()"
			[disableRipple]="true"
		>
			<mat-icon class="material-symbols-outlined">subtitles</mat-icon>
			<span class="button-text">
				@if (isCaptionsButtonDisabled()) {
					{{ 'CAPTIONS.DISABLED_BY_ADMIN_TEXT' | translate }}
				} @else {
					{{ areCaptionsEnabledByUser() ? ('CAPTIONS.DISABLE' | translate) : ('CAPTIONS.ENABLE' | translate) }}
				}
			</span>
		</button>
	} @else {
		<button
			id="captions-button"
			[ngClass]="areCaptionsEnabledByUser() ? 'active' : ''"
			mat-icon-button
			(click)="onCaptionsClick()"
			[disabled]="isCaptionsButtonDisabled()"
			[disabledInteractive]="isCaptionsButtonDisabled()"
			[disableRipple]="true"
			[matTooltip]="
				isCaptionsButtonDisabled()
					? ('CAPTIONS.DISABLED_BY_ADMIN_TOOLTIP' | translate)
					: areCaptionsEnabledByUser()
						? ('CAPTIONS.DISABLE' | translate)
						: ('CAPTIONS.ENABLE' | translate)
			"
		>
			@if (isCaptionsButtonDisabled()) {
				<mat-icon>subtitles_off</mat-icon>
			} @else {
				<mat-icon>subtitles</mat-icon>
			}
		</button>
	}
}

<!-- Copy Link Button (only for moderators, hidden in webcomponent mode) -->
@if (showCopyLinkButton()) {
	<ov-meeting-toolbar-copy-link-button [isMobile]="isMobile()" />
}
