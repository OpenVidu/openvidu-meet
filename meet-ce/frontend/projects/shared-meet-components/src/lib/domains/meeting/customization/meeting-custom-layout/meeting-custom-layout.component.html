@if (lkRoom()) {
	<div class="main-container" [ngClass]="{ withFooter: areCaptionsEnabledByUser() }">
		<ov-smart-layout
			[ovSmartLayoutAllowed]="showLayoutSelector()"
			[ovShowHiddenParticipantsIndicator]="!shouldShowOverlay()"
			[ngClass]="{ withFooter: areCaptionsEnabledByUser() }"
			(hiddenParticipantsIndicatorClicked)="toggleParticipantsPanel()"
		>
			<ng-container *ovLayoutAdditionalElements>
				@if (shouldShowLinkOverlay()) {
					<div id="share-link-overlay" class="main-share-meeting-link-container fade-in-delayed OV_big">
						<ov-share-meeting-link
							class="main-share-meeting-link"
							[title]="linkOverlayConfig.title"
							[subtitle]="linkOverlayConfig.subtitle"
							[titleSize]="linkOverlayConfig.titleSize"
							[titleWeight]="linkOverlayConfig.titleWeight"
							[meetingUrl]="meetingUrl() ?? ''"
							(copyClicked)="onCopyMeetingLinkClicked()"
						/>
					</div>
				} @else if (shouldShowWaitingOverlay()) {
					<div id="waiting-overlay" class="main-share-meeting-link-container fade-in-delayed OV_big">
						<ov-meeting-waiting-panel
							class="main-share-meeting-link"
							subtitle="You're the only one here right now."
						/>
					</div>
				}
			</ng-container>
		</ov-smart-layout>
	</div>
	<!-- Live Captions Component -->
	@if (areCaptionsEnabledByUser()) {
		<ov-meeting-captions [captions]="captions()" />
	}
}
