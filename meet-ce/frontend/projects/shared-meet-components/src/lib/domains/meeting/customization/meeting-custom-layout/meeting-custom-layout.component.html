@if (lkRoom()) {
	<div class="main-container" [class.withFooter]="areCaptionsEnabledByUser()">
		<ov-smart-layout
			[ovSmartLayoutAllowed]="showLayoutSelector()"
			[ovShowHiddenParticipantsIndicator]="!shouldShowOverlay()"
			[class.withFooter]="areCaptionsEnabledByUser()"
			(hiddenParticipantsIndicatorClicked)="toggleParticipantsPanel()"
		>
			<ng-container *ovLayoutAdditionalElements>
				@if (shouldShowLinkOverlay()) {
					<div id="share-link-overlay" class="main-share-room-access-link-container fade-in-delayed OV_big">
						<ov-share-room-access-link
							class="main-share-room-access-link"
							[title]="'SHARE_OVERLAY.TITLE' | translate"
							[subtitle]="'SHARE_OVERLAY.SUBTITLE' | translate"
							[titleSize]="linkOverlayConfig.titleSize"
							[titleWeight]="linkOverlayConfig.titleWeight"
							[roomAccessUrl]="roomAccessUrl() ?? ''"
							(copyClicked)="onCopyRoomAccessLinkClicked()"
						/>
					</div>
				} @else if (shouldShowWaitingOverlay()) {
					<div id="waiting-overlay" class="main-share-room-access-link-container fade-in-delayed OV_big">
						<ov-meeting-waiting-panel
							class="main-share-room-access-link"
							[subtitle]="'WAITING_PANEL.ALONE_SUBTITLE' | translate"
						/>
					</div>
				}
			</ng-container>
		</ov-smart-layout>
	</div>
	<!-- Live Captions Component -->
	@if (areCaptionsEnabledByUser()) {
		<ov-meeting-captions [captions]="captions()" />
	}
}
