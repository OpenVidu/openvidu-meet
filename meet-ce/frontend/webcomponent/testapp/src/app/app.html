<div class="ta-shell">
	<!-- ── Controls panel ─────────────────────────────────────────────────── -->
	<aside class="ta-controls" data-testid="controls-panel">
		<header class="ta-header">
			<h1>OpenVidu Meet — Testapp</h1>
		</header>

		<!-- Properties form -->
		<section class="ta-section" data-testid="section-properties">
			<h2>Properties</h2>
			<div class="ta-field">
				<label for="roomUrl">roomUrl</label>
				<input id="roomUrl" [(ngModel)]="roomUrlInput" data-testid="input-roomUrl" />
			</div>
			<div class="ta-field">
				<label for="recordingUrl">recordingUrl</label>
				<input id="recordingUrl" [(ngModel)]="recordingUrlInput" data-testid="input-recordingUrl" />
			</div>
			<div class="ta-field">
				<label for="participantName">participantName</label>
				<input id="participantName" [(ngModel)]="participantNameInput" data-testid="input-participantName" />
			</div>
			<div class="ta-field">
				<label for="e2eeKey">e2eeKey</label>
				<input id="e2eeKey" [(ngModel)]="e2eeKeyInput" data-testid="input-e2eeKey" />
			</div>
			<div class="ta-field">
				<label for="leaveRedirectUrl">leaveRedirectUrl</label>
				<input id="leaveRedirectUrl" [(ngModel)]="leaveRedirectUrlInput" data-testid="input-leaveRedirectUrl" />
			</div>
			<div class="ta-field">
				<label for="showRecording">showRecording</label>
				<input id="showRecording" [(ngModel)]="showRecordingInput" data-testid="input-showRecording" />
			</div>
			<div class="ta-field ta-field--checkbox">
				<label>
					<input
						type="checkbox"
						[(ngModel)]="showOnlyRecordingsInput"
						data-testid="input-showOnlyRecordings"
					/>
					showOnlyRecordings
				</label>
			</div>
			<button class="ta-btn" (click)="applyConfig()" data-testid="btn-apply-config">Apply config</button>
		</section>

		<!-- Imperative methods -->
		<section class="ta-section" data-testid="section-imperative">
			<h2>Imperative API</h2>
			<!-- The `id` attributes mirror the legacy testapp's IDs so the WC e2e suite
				 can locate these buttons at the page-level (`page.locator('#leave-room-btn')`)
				 without going through the testapp helper. -->
			<button id="end-meeting-btn" class="ta-btn" (click)="callEndMeeting()" data-testid="btn-end-meeting">
				endMeeting()
			</button>
			<button id="leave-room-btn" class="ta-btn" (click)="callLeaveRoom()" data-testid="btn-leave-room">
				leaveRoom()
			</button>
			<div class="ta-row">
				<input
					id="participant-identity-input"
					[(ngModel)]="kickIdentityInput"
					placeholder="participant identity"
					data-testid="input-kick-identity"
				/>
				<button
					id="kick-participant-btn"
					class="ta-btn"
					(click)="callKickParticipant()"
					data-testid="btn-kick-participant"
				>
					kickParticipant()
				</button>
			</div>
		</section>

		<!-- on / once / off API -->
		<section class="ta-section" data-testid="section-event-api">
			<h2>on / once / off API</h2>
			<button class="ta-btn" (click)="callOn()" data-testid="btn-on-joined">on("joined")</button>
			<button class="ta-btn" (click)="callOnce()" data-testid="btn-once-joined">once("joined")</button>
			<button class="ta-btn" (click)="callOff()" data-testid="btn-off-joined">off("joined")</button>
		</section>

		<!-- Event log -->
		<app-event-log [entries]="log.entries()" (clear)="log.clear()" />
	</aside>

	<!-- ── WebComponent area ───────────────────────────────────────────────── -->
	<main class="ta-wc-area" data-testid="wc-area">
		@if (wcMounted()) {
			<openvidu-meet-angular
				#meetRef
				[roomUrl]="roomUrl()"
				[recordingUrl]="recordingUrl()"
				[participantName]="participantName()"
				[e2eeKey]="e2eeKey()"
				[leaveRedirectUrl]="leaveRedirectUrl()"
				[showOnlyRecordings]="showOnlyRecordings()"
				[showRecording]="showRecording()"
				(joined)="handleJoined($event)"
				(left)="handleLeft($event)"
				(closed)="handleClosed()"
				data-testid="openvidu-meet"
			>
				<!-- <div slot="toolbar" class="ta-slot ta-slot--toolbar" data-testid="slot-toolbar">
					Custom toolbar (slot=toolbar)
				</div>

				<div slot="side" class="ta-slot ta-slot--side" data-testid="slot-side">
					<p>Side panel</p>
					<small>(slot=side)</small>
				</div>

				<div slot="layout" class="ta-slot ta-slot--layout" data-testid="slot-layout">
					<div slot="participant-1" class="ta-participant" data-testid="slot-participant-1">P1 — injected</div>
					<div slot="participant-2" class="ta-participant" data-testid="slot-participant-2">P2 — injected</div>
				</div> -->
			</openvidu-meet-angular>
		}
	</main>
</div>
