# This file instructs Redocly's linter to ignore the rules contained for specific parts of your API.
# See https://redocly.com/docs/cli/ for more information.
rooms/responses/errors/bulk-delete-rooms.yaml:
  no-invalid-media-type-examples:
    - >-
      #/content/application~1json/examples/partial_deletion_with_errors/value/successful/0/roomId
    - >-
      #/content/application~1json/examples/partial_deletion_with_errors/value/successful/1/roomId
shared/security.yaml:
  no-unused-components:
    - '#/refreshTokenHeader'
    - '#/apiKeyHeader'
webhooks/webhooks.yaml:
  security-defined:
    - '#/recordingStarted/post'
    - '#/recordingUpdated/post'
    - '#/recordingEnded/post'
    - '#/meetingStarted/post'
    - '#/meetingEnded/post'
config/schemas/global-security-config.yaml:
  struct:
    - '#/AuthenticationConfig'
    - '#/OAuthProviderConfig'
config/schemas/rooms-appearance-config.yaml:
  struct:
    - '#/MeetAppearanceConfig'
    - '#/MeetRoomTheme'
    - '#/MeetRoomThemeMode'
meetings/meetings.yaml:
  path-parameters-defined:
    - >-
      #/~1meetings~1{roomId}~1participants~1{participantIdentity}/delete/parameters
    - >-
      #/~1meetings~1{roomId}~1participants~1{participantIdentity}~1role/put/parameters
auth/auth.yaml:
  security-defined:
    - '#/~1auth~1login/post'
    - '#/~1auth~1logout/post'
config/config.yaml:
  security-defined:
    - '#/~1config~1webhooks~1test/post'
    - '#/~1config~1security/get'
    - '#/~1config~1captions/get'
