/config/webhooks:
    get:
        operationId: getWebhooksConfig
        summary: Get webhooks config
        description: >
            Retrieves the webhooks config for the OpenVidu Meet application.
        tags:
            - Internal API - Global Config
        security:
            - accessTokenHeader: []
        responses:
            '200':
                $ref: './responses/success/get-webhooks-config.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'
    put:
        operationId: updateWebhooksConfig
        summary: Update webhooks config
        description: >
            Updates the webhooks config for the OpenVidu Meet application.
        tags:
            - Internal API - Global Config
        security:
            - accessTokenHeader: []
        requestBody:
            $ref: './requests/update-webhooks-config.yaml'
        responses:
            '200':
                $ref: './responses/success/update-webhooks-config.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '422':
                $ref: '../shared/responses/errors/validation.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'

/config/webhooks/test:
    post:
        operationId: testWebhookUrl
        summary: Test webhook URL
        description: >
            Tests the provided webhook URL to ensure it is valid and reachable.
        tags:
            - Internal API - Global Config
        requestBody:
            $ref: './requests/test-webhook-url.yaml'
        responses:
            '200':
                $ref: './responses/success/test-webhook-url.yaml'
            '400':
                $ref: './responses/errors/webhook-url-unreachable.yaml'
            '422':
                $ref: '../shared/responses/errors/validation.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'

