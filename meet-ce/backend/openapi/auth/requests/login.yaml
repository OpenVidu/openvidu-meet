description: User credentials
required: true
content:
    application/json:
        schema:
            type: object
            properties:
                userId:
                    type: string
                    description: The ID of the user.
                    example: 'admin'
                password:
                    type: string
                    description: The password of the user.
                    example: 'password123'
            required:
                - userId
                - password
