description: Success response for retrieving a room member info
content:
    application/json:
        schema:
            allOf:
                - $ref: '../../schemas/meet-room-member.yaml'
                - type: object
                  properties:
                      _extraFields:
                          type: array
                          description: >
                              List of extra fields that can be included in the response based on the `X-ExtraFields` header or `extraFields` query parameter.
                          items:
                              type: string
                              example: effectivePermissions
        examples:
            default_member_details:
                summary: Member details without extra fields (effectivePermissions excluded by default)
                value:
                    memberId: 'alice_smith'
                    roomId: 'room-123'
                    type: 'registered'
                    name: 'Alice Smith'
                    membershipDate: 1620000000000
                    accessUrl: 'https://example.com/room/room-123'
                    baseRole: 'moderator'
                    customPermissions:
                        canEndMeeting: false
                    permissionsUpdatedAt: 1620000000000
                    _extraFields: ['effectivePermissions']
            extraFields=effectivePermissions:
                summary: Full member details including effectivePermissions
                value:
                    memberId: 'alice_smith'
                    roomId: 'room-123'
                    type: 'registered'
                    name: 'Alice Smith'
                    membershipDate: 1620000000000
                    accessUrl: 'https://example.com/room/room-123'
                    baseRole: 'moderator'
                    customPermissions:
                        canEndMeeting: false
                    effectivePermissions:
                        canRecord: true
                        canRetrieveRecordings: true
                        canDeleteRecordings: true
                        canJoinMeeting: true
                        canShareAccessLinks: true
                        canMakeModerator: true
                        canKickParticipants: true
                        canEndMeeting: false
                        canPublishVideo: true
                        canPublishAudio: true
                        canShareScreen: true
                        canReadChat: true
                        canWriteChat: true
                        canChangeVirtualBackground: true
                    permissionsUpdatedAt: 1620000000000
                    _extraFields: ['effectivePermissions']
            fields=memberId,accessUrl:
                summary: Member details with memberId and accessUrl only
                value:
                    memberId: 'alice_smith'
                    accessUrl: 'https://example.com/room/room-123'
