type: object
properties:
    memberId:
        type: string
        example: 'alice_smith'
        description: |
            The unique identifier of the room member.

            - For users: This is set to the userId of the linked Meet user account.
            - For identified guests: This is an automatically generated unique identifier starting from 'guest-'.
    roomId:
        type: string
        example: 'room-123'
        description: >
            The unique identifier of the room this member belongs to.
    type:
        type: string
        enum:
            - user
            - identified_guest
        example: 'user'
        description: |
            The type of the room member. Options are:
            - user: A user, linked to a Meet user account.
            - identified_guest: An identified guest, not linked to any Meet user account.
    name:
        type: string
        example: 'Alice Smith'
        description: |
            The display name for the participant when joining the meeting with this member access.

            - For users, this is their profile name.
            - For identified guests, this is the assigned name.
    membershipDate:
        type: number
        example: 1620000000000
        description: >
            The timestamp (in milliseconds since Unix epoch) when this member was added to the room.
    accessUrl:
        type: string
        format: uri
        example: 'http://localhost:6080/room/room-123'
        description: >
            The URL for this member to access the room. Identified guests receives a unique access URL, while users use the shared user access URL.
            This URL provides access with the specific permissions assigned to this member.
    baseRole:
        type: string
        enum:
            - moderator
            - speaker
        example: 'speaker'
        description: |
            The base role that defines the default permissions for this member. Options are:
            - moderator: By default, has full permissions to manage the room and meeting.
            - speaker: By default, has permissions to publish audio and video streams.

            Individual permissions can be overridden through the customPermissions object.
    customPermissions:
        type: object
        additionalProperties:
            type: boolean
        example:
            canShareScreen: false
            canRecord: true
        description: |
            Custom permission overrides for this member. This object contains only the permissions that differ from the base role defaults.

            Each property is a permission name with a boolean value indicating whether the permission is granted or denied.
    effectivePermissions:
        $ref: ../../rooms/schemas/meet-permissions.yaml
        description: |
            The complete set of effective permissions for this member. This object is calculated by applying the customPermissions
            overrides to the base role defaults, resulting in the final permissions that will be enforced.
            <br/><br/>

            **Excluded from responses by default to reduce payload size.**
            To include it in the response:
            - **POST/PUT requests:** use the `X-ExtraFields: effectivePermissions` header
            - **Other requests:** use either the `extraFields=effectivePermissions` query parameter or the `X-ExtraFields: effectivePermissions` header
    permissionsUpdatedAt:
        type: number
        example: 1620000000000
        description: >
            Timestamp (in milliseconds since the Unix epoch) of the last time this member's effective permissions were updated.
