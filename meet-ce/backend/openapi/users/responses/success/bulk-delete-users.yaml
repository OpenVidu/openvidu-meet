description: All specified users were deleted successfully.
content:
    application/json:
        schema:
            type: object
            properties:
                message:
                    type: string
                deleted:
                    type: array
                    items:
                        type: string
                    description: List of users that were deleted successfully.
                failed:
                    type: array
                    description: Always present; empty when all users were deleted successfully.
                    items:
                        type: object
                        properties:
                            userId:
                                type: string
                            error:
                                type: string
                                description: Name of the error
                            message:
                                type: string
                                description: Description of the error
        example:
            message: "All users deleted successfully"
            deleted:
                - 'alice_smith'
                - 'john_doe'
            failed: []
