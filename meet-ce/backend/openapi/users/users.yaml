/users:
    post:
        operationId: createUser
        summary: Create a new user
        description: |
            Creates a new user account in the system.

            The userId must be unique. If a user with the specified userId already exists,
            the request will fail with a conflict error.
        tags:
            - OpenVidu Meet - Users
        security:
            - apiKeyHeader: []
            - accessTokenHeader: []
        requestBody:
            $ref: './requests/create-user.yaml'
        responses:
            '201':
                $ref: './responses/success/create-user.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '409':
                $ref: './responses/errors/userId-already-exists.yaml'
            '422':
                $ref: '../shared/responses/errors/validation.yaml'
            '429':
                $ref: '../shared/responses/errors/too-many-requests.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'
    get:
        operationId: getUsers
        summary: Get all users
        description: |
            Retrieves a paginated list of all users in the system.

            By default, the users are sorted by registration date in descending order (newest first).
        tags:
            - OpenVidu Meet - Users
        security:
            - apiKeyHeader: []
            - accessTokenHeader: []
        parameters:
            - $ref: './parameters/user-id-query.yaml'
            - $ref: './parameters/user-name.yaml'
            - $ref: './parameters/user-name-match-mode.yaml'
            - $ref: './parameters/user-name-case-insensitive.yaml'
            - $ref: './parameters/user-role.yaml'
            - $ref: '../shared/parameters/max-items.yaml'
            - $ref: '../shared/parameters/next-page-token.yaml'
            - $ref: './parameters/user-sort-field.yaml'
            - $ref: '../shared/parameters/sort-order.yaml'
        responses:
            '200':
                $ref: './responses/success/get-users.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '422':
                $ref: '../shared/responses/errors/validation.yaml'
            '429':
                $ref: '../shared/responses/errors/too-many-requests.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'
    delete:
        operationId: bulkDeleteUsers
        summary: Bulk delete users
        description: |
            Deletes multiple users at once by their userIds.
        tags:
            - OpenVidu Meet - Users
        security:
            - apiKeyHeader: []
            - accessTokenHeader: []
        parameters:
            - $ref: './parameters/user-ids.yaml'
        responses:
            '200':
                $ref: './responses/success/bulk-delete-users.yaml'
            '400':
                $ref: './responses/errors/bulk-delete-users.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '422':
                $ref: '../shared/responses/errors/validation.yaml'
            '429':
                $ref: '../shared/responses/errors/too-many-requests.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'
/users/{userId}:
    get:
        operationId: getUser
        summary: Get a user
        description: >
            Retrieves the details of a specific user by their userId.
        tags:
            - OpenVidu Meet - Users
        security:
            - apiKeyHeader: []
            - accessTokenHeader: []
        parameters:
            - $ref: './parameters/user-id-path.yaml'
        responses:
            '200':
                $ref: './responses/success/get-user.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '404':
                $ref: './responses/errors/user-not-found.yaml'
            '429':
                $ref: '../shared/responses/errors/too-many-requests.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'
    delete:
        operationId: deleteUser
        summary: Delete a user
        description: |
            Deletes a user from the system.

            This operation will remove the user account and may affect rooms and resources
            associated with this user.

            > **Note:** Cannot delete your own user account or the root admin user.
        tags:
            - OpenVidu Meet - Users
        security:
            - apiKeyHeader: []
            - accessTokenHeader: []
        parameters:
            - $ref: './parameters/user-id-path.yaml'
        responses:
            '200':
                $ref: './responses/success/delete-user.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '404':
                $ref: './responses/errors/user-not-found.yaml'
            '429':
                $ref: '../shared/responses/errors/too-many-requests.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'
/users/{userId}/password:
    put:
        operationId: resetUserPassword
        summary: Reset user password
        description: |
            Allows an admin to reset the password of a specific user.

            > **Note:** Cannot reset your own password using this endpoint. Use the `change-password` endpoint instead.
        tags:
            - OpenVidu Meet - Users
        security:
            - apiKeyHeader: []
            - accessTokenHeader: []
        parameters:
            - $ref: './parameters/user-id-path.yaml'
        requestBody:
            $ref: './requests/reset-password.yaml'
        responses:
            '200':
                $ref: './responses/success/reset-password.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '404':
                $ref: './responses/errors/user-not-found.yaml'
            '422':
                $ref: '../shared/responses/errors/validation.yaml'
            '429':
                $ref: '../shared/responses/errors/too-many-requests.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'
/users/{userId}/role:
    put:
        operationId: updateUserRole
        summary: Update user role
        description: |
            Allows an admin to change the role of a specific user.

            > **Note:** Cannot change your own role or the role of the root admin user.
        tags:
            - OpenVidu Meet - Users
        security:
            - apiKeyHeader: []
            - accessTokenHeader: []
        parameters:
            - $ref: './parameters/user-id-path.yaml'
        requestBody:
            $ref: './requests/update-user-role.yaml'
        responses:
            '200':
                $ref: './responses/success/update-user-role.yaml'
            '401':
                $ref: '../shared/responses/errors/unauthorized.yaml'
            '403':
                $ref: '../shared/responses/errors/forbidden.yaml'
            '404':
                $ref: './responses/errors/user-not-found.yaml'
            '422':
                $ref: '../shared/responses/errors/validation.yaml'
            '429':
                $ref: '../shared/responses/errors/too-many-requests.yaml'
            '500':
                $ref: '../shared/responses/errors/internal-server.yaml'
